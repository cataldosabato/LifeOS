<style>
:root {
  --bg-color: #0a0a0f;
  --panel-bg: #12121a;
  --sidebar-bg: #0e0e15;
  --primary: #7c6af7;
  --primary-hover: #9182f9;
  --secondary: #fb923c;
  --accent: #a89cf8;
  --border-color: rgba(124, 106, 247, 0.16);
  --success: #34d399;
  --danger: #f87171;
  --warning: #fb923c;
  --text-primary: #f0f0f8;
  --text-secondary: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body, #app { height: 100%; overflow: hidden; background: var(--bg-color); font-family: 'Inter', sans-serif; color: var(--text-primary); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
input, textarea, select { font-family: 'Inter', sans-serif; -webkit-appearance: none; appearance: none; outline: none; width: 100%; }
input[type=range] { -webkit-appearance: none; background: transparent; border: none; padding: 0; }
input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #22223a; border-radius: 3px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); margin-top: -7px; cursor: pointer; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
@keyframes popIn { 0% { transform: scale(.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.fadeUp { animation: fadeUp .3s ease both; }
.pulse { animation: pulse 1.4s ease infinite; }
.popIn { animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; }

/* MAIN SIDEBAR LAYOUT */
#app { display: flex; width: 100%; height: 100%; position: relative; }
.sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 998; transition: opacity .3s; }
.sidebar-backdrop.show { display: block; }
.sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0; z-index: 999; transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1); }
.sidebar-header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
.sidebar-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 22px; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sidebar-close { display: none; background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; align-items: center; justify-content: center; }
.sidebar-close:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
.sidebar-profile { padding: 14px; margin: 14px; background: rgba(124,106,247,0.04); border: 1px solid var(--border-color); border-radius: 12px; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; color: var(--text-secondary); font-weight: 500; font-size: 14px; cursor: pointer; transition: all .2s; border: 1px solid transparent; }
.nav-item:hover { color: var(--text-primary); background: rgba(124,106,247,0.06); }
.nav-item.active { color: #fff; background: var(--primary); font-weight: 600; box-shadow: 0 4px 12px rgba(124,106,247,0.22); }
.nav-item .icon { font-size: 16px; }
.nav-item .lbl { flex: 1; }
.nav-item .badge { font-size: 10px; font-weight: 700; background: var(--secondary); color: #fff; padding: 2px 6px; border-radius: 10px; }

.main-layout { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }
.header { background: linear-gradient(135deg, var(--panel-bg), #1a1a26); padding: 14px 18px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding-top: max(14px, env(safe-area-inset-top)); }
.menu-trigger { display: none; background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; width: 38px; height: 38px; border-radius: 50%; align-items: center; justify-content: center; background: rgba(124,106,247,0.08); margin-right: 8px; }
.content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px 16px; -webkit-overflow-scrolling: touch; }

@media (max-width: 991px) {
  .sidebar { position: fixed; height: 100%; left: 0; top: 0; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-close { display: flex; }
  .menu-trigger { display: inline-flex; }
}

/* CARDS */
.card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 18px; margin-bottom: 14px; }
.card.glow { box-shadow: 0 8px 24px rgba(124,106,247,0.1); border-color: rgba(124,106,247,0.28); }
.grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
.grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.stat-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 12px 10px; text-align: center; }
.stat-card .val { font-weight: 700; font-size: 19px; margin: 4px 0; font-family: 'Space Grotesk', sans-serif; }
.stat-card .lbl { font-size: 11px; color: var(--text-secondary); }
.section-gap { display: flex; flex-direction: column; gap: 14px; max-width: 800px; margin: 0 auto; }

/* BUTTONS */
.btn { cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; border-radius: 10px; border: 2px solid var(--primary); background: var(--primary); color: #fff; padding: 10px 18px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all .2s; width: auto; }
.btn:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); transform: translateY(-1px); }
.btn:active:not(:disabled) { transform: translateY(1px); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn.full { width: 100%; display: flex; }
.btn.sm { padding: 6px 12px; font-size: 12px; }
.btn.outline { background: transparent; color: var(--primary); }
.btn.outline:hover:not(:disabled) { background: rgba(124,106,247,0.06); }
.btn.red { border-color: var(--danger); background: var(--danger); }
.btn.red.outline { background: transparent; color: var(--danger); }
.btn.green { border-color: var(--success); background: var(--success); }
.btn.green.outline { background: transparent; color: var(--success); }
.btn.orange { border-color: var(--secondary); background: var(--secondary); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.76); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-box { background: var(--panel-bg); border-radius: 20px; padding: 22px; width: 100%; max-width: 500px; max-height: 88vh; overflow-y: auto; border: 1px solid var(--border-color); animation: popIn .25s ease; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; }
.modal-close { background: #22223a; border: none; color: var(--text-primary); width: 32px; height: 32px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
@media(max-width: 576px) {
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal-box { border-radius: 20px 20px 0 0; max-height: 94vh; }
}

/* INPUTS */
.inp { background: #181824; color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 12px; font-size: 14px; width: 100%; transition: all .2s; }
.inp:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,106,247,0.12); }
.inp-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; letter-spacing: .5px; margin-bottom: 5px; text-transform: uppercase; }

/* COMPONENT DETAILS */
.xp-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
.xp-level { font-size: 12px; color: var(--accent); font-weight: 700; }
.xp-track { height: 6px; background: #22223a; border-radius: 3px; overflow: hidden; }
.xp-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width .6s; }
.xp-text { font-size: 11px; color: var(--text-secondary); }

.timeline-line { position: absolute; left: 46px; top: 8px; bottom: 8px; width: 2px; background: rgba(124,106,247,0.15); z-index: 0; }
.timeline-row { display: flex; gap: 12px; margin-bottom: 12px; position: relative; z-index: 1; }
.timeline-time { display: flex; flex-direction: column; align-items: center; min-width: 60px; padding-top: 4px; }
.timeline-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 5px; border: 3px solid; background: var(--bg-color); transition: all .3s; }
.timeline-body { flex: 1; background: #1a1a26; border: 1px solid var(--border-color); border-radius: 14px; padding: 12px 14px; transition: all .3s; }
.timeline-body.done { opacity: .7; }
.check-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid rgba(124,106,247,0.22); background: transparent; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .3s; font-weight: 700; flex-shrink: 0; }
.check-btn.done { background: var(--success); border-color: var(--success); }

.chat-bubble { max-width: 80%; border-radius: 16px; padding: 10px 14px; font-size: 14px; line-height: 1.6; }
.chat-bubble.user { background: var(--primary); border-radius: 16px 16px 4px 16px; align-self: flex-end; box-shadow: 0 4px 12px rgba(124,106,247,0.15); }
.chat-bubble.ai { background: #1a1a26; border-radius: 16px 16px 16px 4px; border: 1px solid var(--border-color); }

.badge-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 2005; background: var(--panel-bg); border: 2px solid #f5c542; border-radius: 16px; padding: 14px 20px; text-align: center; min-width: 220px; box-shadow: 0 8px 32px rgba(245,197,66,.25); }
.prog-bar { height: 8px; background: #22223a; border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width .6s; }
.cat-chip { background: #1a1a26; border: 1px solid var(--border-color); border-radius: 10px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .2s; }
.cat-chip.sel { background: rgba(124,106,247,0.14); border-color: var(--primary); }
.eng-option { padding: 10px 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border-color); background: #1a1a26; cursor: pointer; font-size: 14px; transition: all .2s; }
.eng-option.sel { border-color: var(--primary); background: rgba(124,106,247,0.14); }
.row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(124,106,247,0.08); }
.row:last-child { border-bottom: none; }
</style>
</head>

function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

// ── UTILITIES & HELPER FUNCTIONS ──────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { return new Date(d+'T12:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short'}); }

function toggleSidebar(open) {
  const sb = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  if (open) {
    sb.classList.add('open');
    backdrop.classList.add('show');
  } else {
    sb.classList.remove('open');
    backdrop.classList.remove('show');
  }
}

function setTab(id) {
  S.tab = id;
  toggleSidebar(false);
  render();
}

function addXP(amt) {
  S.profile.xp = (S.profile.xp||0) + amt;
  S.profile.level = Math.floor(S.profile.xp / 500) + 1;
  saveState();
}

function addBadge(id) {
  if ((S.profile.badges||[]).includes(id)) return;
  const b = BADGES.find(x => x.id === id);
  if (!b) return;
  S.profile.badges = [...(S.profile.badges||[]), id];
  addXP(b.xp);
  showBadgeToast(b);
  saveState();
}

function showBadgeToast(b) {
  const t = document.getElementById('toast');
  t.innerHTML = `<div class="badge-toast popIn">
    <div style="font-size:38px;margin-bottom:4px">${b.e}</div>
    <div style="font-size:10px;color:#f5c542;font-weight:700;letter-spacing:1.5px;margin-bottom:2px">BADGE SBLOCCATO!</div>
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;margin-bottom:3px">${b.l}</div>
    <div style="font-size:11px;color:var(--accent);font-weight:600">+${b.xp} XP</div>
  </div>`;
  setTimeout(() => { t.innerHTML = ''; }, 3500);
}

function re() { render(); saveState(); }

function renderNav() {
  const navBox = document.getElementById('nav');
  navBox.innerHTML = TABS.map(t => {
    let badgeHtml = '';
    if (t.id === 'english') {
      const remainingReviews = S.dict.filter(w => w.nextReview <= todayStr()).length;
      if (remainingReviews > 0) badgeHtml = `<span class="badge">${remainingReviews}</span>`;
    } else if (t.id === 'planner') {
      const remainingPlans = S.schedule.filter(x => x.date === todayStr() && !x.done).length;
      if (remainingPlans > 0) badgeHtml = `<span class="badge" style="background:var(--primary)">${remainingPlans}</span>`;
    } else if (t.id === 'calendar') {
      const upEvents = S.events.filter(e => e.date >= todayStr()).length;
      if (upEvents > 0) badgeHtml = `<span class="badge" style="background:var(--success)">${upEvents}</span>`;
    }
    
    return `
      <div class="nav-item ${S.tab === t.id ? 'active' : ''}" onclick="setTab('${t.id}')">
        <span class="icon">${t.i}</span>
        <span class="lbl">${t.l}</span>

  }).join('');
}

function pageFocus() {
  const MODES = {work:{l:'Focus',m:25,c:'var(--primary)'},short:{l:'Pausa Breve',m:5,c:'var(--success)'},long:{l:'Pausa Lunga',m:15,c:'#60a5fa'}};
  const mode = S.pomMode;
  const total = MODES[mode].m * 60;
  const elapsed = total - (S.pomMins*60 + S.pomSecs);
  const pct = elapsed / total * 100;
  const R = 65, circ = 2*Math.PI*R;
  const todayTasks = S.schedule.filter(x => x.date === todayStr() && !x.done);

  return `<div class="section-gap">
    <div class="card">
      <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
        ${Object.entries(MODES).map(([k,v]) =>
          `<button class="btn sm pomo-mode ${mode===k?'':'outline'}" style="border-color:${v.c};background:${mode===k?v.c:'transparent'};color:${mode===k?'#fff':v.c}" onclick="setPomMode('${k}')">${v.l}</button>`
        ).join('')}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px">
        <div style="position:relative;width:150px;height:150px">
          <svg width="150" height="150" style="transform:rotate(-90deg)">
            <circle cx="75" cy="75" r="${R}" fill="none" stroke="#22223a" stroke-width="8"/>
            <circle cx="75" cy="75" r="${R}" fill="none" stroke="${MODES[mode].c}" stroke-width="8"
               stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"
               stroke-linecap="round" style="transition:stroke-dashoffset .8s"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px">
            <span style="font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700">${String(S.pomMins).padStart(2,'0')}:${String(S.pomSecs).padStart(2,'0')}</span>
            <span style="font-size:11px;color:var(--text-secondary)">${MODES[mode].l}</span>
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn sm" style="background:${MODES[mode].c};border-color:${MODES[mode].c}" onclick="togglePom()">${S.pomRunning?'⏸ Pausa':'▶ Avvia'}</button>
          <button class="btn sm outline" onclick="resetPom()">↺ Reset</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${[0,1,2,3].map(i => `<div style="width:8px;height:8px;border-radius:50%;background:${i<(S.pomSessions%4)?MODES.work.c:'#22223a'}"></div>`).join('')}
          <span style="font-size:11px;color:var(--text-secondary);margin-left:4px">🍅 ${S.pomSessions} sessioni</span>
        </div>
      </div>
    </div>

    <!-- Collegamento Attività in Agenda -->
    <div class="card" style="border-color:rgba(124,106,247,0.3)">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span>🔗</span> Collega ad Attività in Agenda
      </div>
      ${todayTasks.length === 0 ? `
        <div style="font-size:12px;color:var(--text-secondary)">Nessuna attività programmata rimasta per oggi. Creane una nella sezione Piano!</div>
      ` : `
        <div style="font-size:11.5px;color:var(--text-secondary);margin-bottom:8px">Al termine della sessione di Focus, il compito selezionato verrà automaticamente impostato come completato e registrato.</div>
        <select class="inp" onchange="S.pomLinkedTaskId = this.value ? +this.value : null; saveState(); re();" style="font-size:13px;padding:8px">
          <option value="">-- Seleziona un compito da completare --</option>
          ${todayTasks.map(t => `<option value="${t.id}" ${S.pomLinkedTaskId === t.id ? 'selected' : ''}>[${getCat(t.category).e} ${getCat(t.category).l}] ${t.title} (${t.startTime})</option>`).join('')}
        </select>
        ${S.pomLinkedTaskId ? `
          <div style="margin-top:8px;font-size:11.5px;color:var(--primary);font-weight:600;display:flex;align-items:center;gap:4px">
            <span>🎯</span> Collegato a: "${S.schedule.find(x => x.id === S.pomLinkedTaskId)?.title || 'Compito'}"
          </div>
        ` : ''}
      `}
    </div>
  </div>`;
}

function pageStats() {
  const wDays = Array.from({length:7},(_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    const ds = d.toISOString().split('T')[0];
    const acts = S.activities.filter(a => a.date===ds);
    return {date:ds, label:WD[d.getDay()], mins:acts.reduce((s,a)=>s+a.duration,0)};
  });
  const maxMins = Math.max(...wDays.map(d=>d.mins), 1);
  const catStats = CATS.map(c => ({...c, mins:S.activities.filter(a=>a.category===c.id).reduce((s,a)=>s+a.duration,0)})).filter(c=>c.mins>0).sort((a,b)=>b.mins-a.mins);
  const totalCatMins = catStats.reduce((s,c)=>s+c.mins,0);

  return `<div class="section-gap">
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">📊 Attività settimanale (min)</div>
      <div style="display:flex;gap:6px;align-items:flex-end;height:100px">
        ${wDays.map(d => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:9px;color:var(--text-secondary);min-height:12px">${d.mins>0?d.mins+'m':''}</div>
            <div style="width:100%;border-radius:4px 4px 0 0;background:${d.date===todayStr()?'var(--primary)':'#22223a'};height:${Math.max(d.mins/maxMins*70,d.mins>0?6:2)}px;transition:height .6s"></div>
            <div style="font-size:10px;color:${d.date===todayStr()?'var(--primary)':'var(--text-secondary)'}">${d.label}</div>
          </div>`).join('')}
      </div>
    </div>

    ${catStats.length > 0 ? `
    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">Distribuzione categorie</div>
      ${catStats.map(c => {
        const pct = Math.round(c.mins/totalCatMins*100);
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:2px">
            <span style="font-size:12px">${c.e} ${c.l}</span>
            <span style="font-size:12px;color:${c.c};font-weight:700">${pct}%</span>
          </div>
          <div class="prog-bar" style="height:6px"><div class="prog-fill" style="width:${pct}%;background:${c.c}"></div></div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div class="card">
      <div style="font-weight:700;margin-bottom:10px">😊 Umore degli ultimi giorni</div>
      <div style="display:flex;justify-content:space-around;align-items:center">
        ${wDays.map(d => {
          const m = S.moods.find(x => x.date===d.date);
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:20px">${m?['😔','😐','🙂','😊','🤩'][m.value-1]:'—'}</div>
            <div style="font-size:10px;color:var(--text-secondary)">${d.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function pageGoals() {

    <button class="btn full" onclick="openModal('goal')">🎯 Imposta nuovo obiettivo</button>

    <div class="card" style="text-align:center;padding:28px">
      <div style="font-size:38px;margin-bottom:6px">🎯</div>
      <div style="font-weight:700">Imposta i tuoi obiettivi</div>
      <div style="color:var(--text-secondary);font-size:13px">Fissa delle mete periodiche per rimanere allineato.</div>
    </div>` : S.goals.map(g => {
      const pct = Math.min(g.progress/g.target*100,100);
      return `<div class="card" style="opacity:${g.done?.6:1}">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <div style="font-weight:700;font-size:13px">${g.title}</div>
          <button onclick="delGoal(${g.id})" style="background:none;border:none;color:var(--text-secondary);font-size:16px;cursor:pointer">×</button>

function renderModal() {

  const bodies = { act:modalAct, event:modalEvent, plan:modalPlan, goal:modalGoal, diary:modalDiary, sleep:modalSleep, profile:modalProfile, repeatSchedule:modalRepeatSchedule };

  document.getElementById('modals').innerHTML = `

// ── ACTION LOGGERS & BUSINESS LOGIC ───────────────────────────────────────────
function logAct() {
  const f = S.actForm;
  S.activities.push({...f, id:Date.now(), date:todayStr(), time:new Date().toISOString()});
  addXP(f.duration >= 60 ? 50 : 25);
  if (S.activities.length === 1) addBadge('first_task');
  const sm = S.activities.filter(a=>a.category==='study').reduce((s,a)=>s+a.duration,0);
  if (sm >= 600) addBadge('study_master');
  if (S.activities.filter(a=>a.category==='sport').length >= 10) addBadge('sport_hero');
  checkStreak();
  closeModal(); re();
}

function logEvent() {
  const f = S.eventForm; if (!f.title) return;
  S.events.push({...f, id:Date.now()});
  S.eventForm = {title:'', date:todayStr(), time:'09:00', note:''};
  closeModal(); re();
}

function logPlan() {
  const f = S.planForm; if (!f.title.trim()) return;
  S.schedule.push({...f, id:Date.now(), date:S.plannerDate, done:false, doneAt:null});
  const dayCount = S.schedule.filter(s => s.date===S.plannerDate).length;
  if (dayCount >= 5) addBadge('planner_pro');
  addXP(5);
  S.planForm = {title:'', category:'study', startTime:'09:00', endTime:'10:00', priority:'normal', note:''};
  closeModal(); re();
}

function logGoal() {
  const f = S.goalForm; if (!f.title) return;
  S.goals.push({...f, id:Date.now(), progress:0, done:false});
  S.goalForm = {title:'', target:7, unit:'giorni'};
  closeModal(); re();
}

function logDiary() {
  if (!S.diaryForm.trim()) return;
  if (S.editingDiaryId) {
    const item = S.diary.find(d => d.id === S.editingDiaryId);
    if (item) {
      item.content = S.diaryForm;
      item.mood = S.moodForm;
    }
    S.editingDiaryId = null;
  } else {
    S.diary.push({id:Date.now(), date:todayStr(), content:S.diaryForm, mood:S.moodForm});
    S.moods.push({date:todayStr(), value:S.moodForm});
    addXP(20);
    if (S.diary.length >= 7) addBadge('diary_7');
  }
  S.diaryForm = '';
  closeModal(); re();
}

function logSleep() {
  const f = S.sleepForm;
  const bed = new Date(`${todayStr()}T${f.bedtime}`);
  const wake = new Date(`${todayStr()}T${f.wake}`);
  let h = (wake-bed)/3600000; if(h<0) h+=24;
  
  if (S.editingSleepId) {
    const item = S.sleepLog.find(s => s.id === S.editingSleepId);
    if (item) {
      item.bedtime = f.bedtime;
      item.wake = f.wake;
      item.hours = Math.round(h*10)/10;
    }
    S.editingSleepId = null;
  } else {
    S.sleepLog.push({id:Date.now(), date:todayStr(), ...f, hours:Math.round(h*10)/10});
    addXP(20);
  }
  closeModal(); re();
}

function togglePlan(id) {
  const item = S.schedule.find(x => x.id===id); if (!item) return;
  item.done = !item.done;
  item.doneAt = item.done ? new Date().toISOString() : null;
  if (item.done) {
    addXP(30);
    addBadge('first_task');
    const dayItems = S.schedule.filter(x => x.date===item.date);
    if (dayItems.length > 1 && dayItems.every(x=>x.done)) addBadge('perfect_day');
    
    // Auto add to S.activities
    const [h1, m1] = (item.startTime || '09:00').split(':').map(Number);
    const [h2, m2] = (item.endTime || '10:00').split(':').map(Number);
    let duration = (h2 * 60 + m2) - (h1 * 60 + m1);
    if (isNaN(duration) || duration <= 0) duration = 30;
    
    const actId = Date.now() + Math.random();
    item.activityId = actId;
    S.activities.push({
      id: actId,
      category: item.category || 'study',
      duration: duration,
      note: `Completato da agenda: ${item.title}` + (item.note ? ` (${item.note})` : ''),
      date: item.date || todayStr(),
      time: new Date().toISOString()
    });
    save('lo_acts', S.activities);
    
    // English integration check
    if (item.category === 'english' || (item.title && /inglese|english/i.test(item.title))) {
      addEnglishXP(50);
    }
  } else {
    if (item.activityId) {
      S.activities = S.activities.filter(a => a.id !== item.activityId);
      save('lo_acts', S.activities);
      delete item.activityId;
    }
  }
  re();
}

function delPlan(id) { S.schedule = S.schedule.filter(x => x.id!==id); re(); }

function stepGoal(id, delta) {
  const g = S.goals.find(x => x.id===id); if (!g) return;
  g.progress = Math.max(0, Math.min(g.target, g.progress+delta));

  re();
}

// ── POMODORO TIMER ENGINE ─────────────────────────────────────────────────────
function setPomMode(m) {
  const M={work:25,short:5,long:15};
  if (S.pomInterval) { clearInterval(S.pomInterval); S.pomInterval=null; }
  S.pomMode=m; S.pomMins=M[m]; S.pomSecs=0; S.pomRunning=false; re();
}
function togglePom() {
  if (S.pomRunning) { clearInterval(S.pomInterval); S.pomInterval=null; S.pomRunning=false; re(); return; }
  S.pomRunning=true;
  S.pomInterval = setInterval(() => {
    if (S.pomSecs===0) {
      if (S.pomMins===0) {
        clearInterval(S.pomInterval); S.pomInterval=null; S.pomRunning=false;
        const M={work:25,short:5,long:15};
        if (S.pomMode==='work') { 
          S.pomSessions++; 
          addXP(30); 
          if(S.pomSessions>=10)addBadge('pomodoro_10'); 
          
          if (S.pomLinkedTaskId) {
            const task = S.schedule.find(x => x.id === S.pomLinkedTaskId);
            if (task) {
              togglePlan(S.pomLinkedTaskId);
              showToastMessage(`🍅 Pomodoro completato! Attività "${task.title}" completata.`);
              if (window.speechSynthesis) {
                const u = new SpeechSynthesisUtterance(`Excellent focus! Task ${task.title} has been completed.`);
                u.lang = 'en-US';
                window.speechSynthesis.speak(u);
              }
            }
            S.pomLinkedTaskId = null;
            saveState();
          }
        }
        S.pomMins=M[S.pomMode]; S.pomSecs=0;
        re(); return;
      }
      S.pomMins--; S.pomSecs=59;
    } else S.pomSecs--;
    re();
  }, 1000);
  re();
}
function resetPom() {
  if (S.pomInterval) { clearInterval(S.pomInterval); S.pomInterval=null; }
  const M={work:25,short:5,long:15};
  S.pomRunning=false; S.pomMins=M[S.pomMode]; S.pomSecs=0; re();
}

// ── GEMINI API INTEGRATION ────────────────────────────────────────────────────
async function askGemini(system, prompt) {
  const apiKey = S.profile.geminiApiKey || '';
  if (!apiKey) {
    return `Ciao! Per sbloccare l'AI Coach di LifeOS, inserisci la tua **GEMINI_API_KEY** personale nelle impostazioni del tuo Profilo (clicca sulla tua icona/avatar in alto a destra o nella barra laterale).
    
Nel frattempo, ecco un consiglio utile: Mantieni costante la tua routine e concentrati su piccoli traguardi giorno dopo giorno! 🚀`;
  }
  
  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contents: [{
          role: 'user',
          parts: [{ text: prompt }]
        }],
        systemInstruction: {
          parts: [{ text: system }]
        },
        generationConfig: {
          maxOutputTokens: 300,
          temperature: 0.7
        }
      })
    });
    
    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTP ${response.status}`);
    }
    
    const data = await response.json();
    const replyText = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!replyText) throw new Error("Risposta vuota dall'API");
    return replyText;
  } catch (err) {
    console.error("Gemini API Error:", err);
    return `⚠️ Errore di connessione a Gemini API: ${err.message}. Verifica la tua chiave API nel Profilo o la tua connessione internet.`;
  }
}

// ── SPEECH RECOGNITION (BUGFIXED) ─────────────────────────────────────────────
async function startSpeak() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { 
    S.engSpeakResult = '⚠️ Il riconoscimento vocale non è supportato da questo browser.'; 
    re(); 
    return; 
  }
  
  // Clean up any stale active speech recognizer
  if (window.currentSpeechRec) {
    try { window.currentSpeechRec.abort(); } catch(e){}
  }
  
  const rec = new SR();
  window.currentSpeechRec = rec;
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  
  S.engSpeakLoading = true;
  S.engSpeakResult = '🎤 Parla adesso...';
  re();
  
  let gotResult = false;
  
  rec.onresult = async e => {
    gotResult = true;
    const tr = e.results[0][0].transcript;
    S.engSpeakResult = `🎤 Hai detto: "${tr}"\n\nAI Coach sta valutando la tua pronuncia...`;
    re();
    
    try {
      const lv = S.profile.englishLevel || 'A1';
      const sys = `Sei un English Speaking Coach per uno studente di livello ${lv}. Offri un feedback concisissimo (max 3 righe) in italiano sulla grammatica e la pronuncia della frase pronunciata dallo studente. Sii incoraggiante ed evidenzia eventuali correzioni in grassetto.`;
      const prompt = `Testo dello studente: "${tr}"`;
      
      const aiResponse = await askGemini(sys, prompt);
      S.engSpeakResult = `🎤 Hai detto: "${tr}"\n\nAI Evaluation:\n${aiResponse}`;
    } catch (err) {
      S.engSpeakResult = `🎤 Hai detto: "${tr}"\n\n⚠️ Errore nella valutazione: ${err.message}`;
    }
    S.engSpeakLoading = false;
    re();
  };
  
  rec.onerror = e => {
    console.error("Speech recognition error event:", e);
    if (!gotResult) {
      S.engSpeakResult = `⚠️ Errore microfono o nessun parlato rilevato (${e.error || 'Generico'}). Riprova!`;
      S.engSpeakLoading = false;
      re();
    }
  };
  
  rec.onend = () => {
    window.currentSpeechRec = null;
    if (S.engSpeakLoading && !gotResult) {
      S.engSpeakResult = '⚠️ Tempo scaduto o nessun parlato rilevato. Clicca di nuovo sul microfono per riprovare.';
      S.engSpeakLoading = false;
      re();
    }
  };
  
  try {
    rec.start();
  } catch (err) {
    console.error("Error starting recognizer:", err);
    S.engSpeakResult = '⚠️ Impossibile accedere al microfono.';
    S.engSpeakLoading = false;
    re();
  }
}

}

// ── REPEAT SCHEDULE LOGIC ─────────────────────────────────────────────────────
function openRepeatScheduleModal() {
  window.repeatTargetDates = [];
  openModal('repeatSchedule');
}

function toggleRepeatTargetDate(date) {
  if (!window.repeatTargetDates) window.repeatTargetDates = [];
  const idx = window.repeatTargetDates.indexOf(date);
  if (idx > -1) {
    window.repeatTargetDates.splice(idx, 1);
  } else {
    window.repeatTargetDates.push(date);
  }
  renderModal();
}

function selectAllRepeatDays(days) {
  window.repeatTargetDates = [...days];
  renderModal();
}

function deselectAllRepeatDays() {
  window.repeatTargetDates = [];
  renderModal();
}

function confirmRepeatSchedule() {
  const selDate = S.plannerDate;
  const targetDates = window.repeatTargetDates || [];
  if (targetDates.length === 0) return;

  const sourceTasks = S.schedule.filter(s => s.date === selDate);
  if (sourceTasks.length === 0) return;

  targetDates.forEach(date => {
    // Rimuovi eventuali compiti preesistenti per quel giorno per evitare duplicati
    S.schedule = S.schedule.filter(s => s.date !== date);

    // Copia i compiti
    sourceTasks.forEach(task => {
      S.schedule.push({
        ...task,
        id: Date.now() + Math.random(),
        date: date,
        done: false // Resetta lo stato di completamento
      });
    });
  });

  closeModal();
  saveState();
  re();
  showToastMessage(`Pianificazione copiata con successo su ${targetDates.length} giorni!`);
}

function showToastMessage(msg) {
  const t = document.getElementById('toast');
  if (t) {
    t.innerHTML = `<div class="badge-toast popIn" style="border-color:var(--primary);box-shadow:0 8px 32px rgba(124,106,247,0.25)">
      <div style="font-size:32px;margin-bottom:4px">🔄</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;margin-bottom:3px">${msg}</div>
    </div>`;
    setTimeout(() => { t.innerHTML = ''; }, 3000);
  }
}

function modalRepeatSchedule() {
  const selDate = S.plannerDate;
  const itemsToCopy = S.schedule.filter(s => s.date === selDate);
  if (itemsToCopy.length === 0) {
    return `<div style="text-align:center;padding:12px">
      <div style="font-size:24px;margin-bottom:8px">⚠️</div>
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">Nessuna attività pianificata</div>
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px">Pianifica almeno un'attività per questa giornata prima di renderla ripetibile.</p>
      <button class="btn sm full" onclick="closeModal()">Ho capito</button>
    </div>`;
  }

  // Genera i prossimi 7 giorni della settimana a partire da oggi
  const days = [];
  const start = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);

    <div style="font-size:12.5px;color:var(--text-secondary);line-height:1.5">

    </div>
    
    <div style="display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;border:1px solid var(--border-color);border-radius:10px;padding:8px">
      ${selectableDays.map(d => {
        const wd = WD[new Date(d+'T12:00').getDay()];
        const isSelected = window.repeatTargetDates.includes(d);
        return `
          <label style="display:flex;align-items:center;gap:10px;padding:8px;cursor:pointer;border-bottom:1px solid rgba(124,106,247,0.06)">
            <input type="checkbox" style="width:18px;height:18px;cursor:pointer" ${isSelected?'checked':''} onchange="toggleRepeatTargetDate('${d}')">
            <span style="font-size:13.5px;font-weight:600">${wd} ${fmtDate(d)}</span>
          </label>
        `;
      }).join('')}
    </div>

    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn outline sm" style="flex:1" onclick="selectAllRepeatDays(${JSON.stringify(selectableDays)})">Tutti</button>
      <button class="btn outline sm" style="flex:1" onclick="deselectAllRepeatDays()">Nessuno</button>
    </div>

    <button class="btn full" onclick="confirmRepeatSchedule()" ${window.repeatTargetDates.length === 0 ? 'disabled' : ''}>
      Copia Programmazione (${window.repeatTargetDates.length} Giorni)
    </button>
  </div>`;
}

// ── ALARM, NOTIFICATION & EDITING SERVICES ────────────────────────────────────
let alarmAudioCtx = null;
let alarmIntervalId = null;

function playAlarmSound() {
  if (alarmIntervalId) return;
  try {
    alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    alarmIntervalId = setInterval(() => {
      if (!S.sleepAlarm || !S.sleepAlarm.ringing) {
        stopAlarmSound();
        return;
      }
      const osc = alarmAudioCtx.createOscillator();
      const gain = alarmAudioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, alarmAudioCtx.currentTime);
      gain.gain.setValueAtTime(0.5, alarmAudioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, alarmAudioCtx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(alarmAudioCtx.destination);
      osc.start();
      osc.stop(alarmAudioCtx.currentTime + 0.5);
    }, 800);
  } catch (e) {
    console.error("Audio Context error:", e);
  }
}

function stopAlarmSound() {
  if (alarmIntervalId) {
    clearInterval(alarmIntervalId);
    alarmIntervalId = null;
  }
  if (alarmAudioCtx) {
    try { alarmAudioCtx.close(); } catch(e){}
    alarmAudioCtx = null;
  }
}

let lastCheckedMinute = '';
function globalTimeCheck() {
  const now = new Date();
  const currentHourMin = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  
  // 1. Check Sleep Alarm
  if (S.sleepAlarm && S.sleepAlarm.enabled && S.sleepAlarm.time === currentHourMin && !S.sleepAlarm.ringing) {
    S.sleepAlarm.ringing = true;
    saveState();
    re();
    playAlarmSound();
    
    if (Notification.permission === 'granted') {
      new Notification("⏰ SVEGLIA!", {
        body: `Sono le ${currentHourMin}. Sveglia attiva!`,
        icon: './icon-192.png',
        tag: 'sleep-alarm'
      });
    }
  }
  
  // 2. Check task notifications
  if (lastCheckedMinute !== currentHourMin) {
    lastCheckedMinute = currentHourMin;
    const today = todayStr();
    const upcomingTasks = S.schedule.filter(x => x.date === today && !x.done && x.startTime === currentHourMin);
    
    upcomingTasks.forEach(task => {
      if (!S.notifiedTaskIds.includes(task.id)) {
        S.notifiedTaskIds.push(task.id);
        saveState();
        
        if (Notification.permission === 'granted') {
          new Notification(`📋 Attività in partenza: ${task.title}`, {
            body: `Ora: ${task.startTime} - ${task.endTime}\n${task.note || ''}`,
            icon: './icon-192.png'
          });
        }
        
        showToastMessage(`🔔 Agenda: ${task.title} sta iniziando!`);
        
        if (window.speechSynthesis) {
          const speakTxt = `It is time for your activity: ${task.title}.`;
          const u = new SpeechSynthesisUtterance(speakTxt);
          u.lang = 'en-US';
          u.rate = 0.95;
          window.speechSynthesis.speak(u);
        }
      }
    });
  }
}

function requestNotificationPermission() {
  if ('Notification' in window) {
    Notification.requestPermission().then(permission => {
      if (permission === 'granted') {
        showToastMessage("🔔 Notifiche abilitate con successo!");
      } else {
        showToastMessage("⚠️ Permesso notifiche negato.");
      }
      re();
    });
  } else {
    showToastMessage("⚠️ Notifiche non supportate da questo browser.");
  }
}

// Start global timer loop
setInterval(globalTimeCheck, 1000);

// ── STREAK HISTORY TRACKER ────────────────────────────────────────────────────
function checkStreak() {
  const td=todayStr();
  if(S.profile.lastActive!==td){
    const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split('T')[0];
    const ns=S.profile.lastActive===ys?(S.profile.streak||0)+1:1;

    if(ns>=3)addBadge('streak_3');
    if(ns>=7)addBadge('streak_7');
    saveState();
  }
}
